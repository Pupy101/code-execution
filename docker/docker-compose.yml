services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      SANDBOX_FUSION_URL: http://sandbox-fusion:8080
    depends_on:
      redis:
        condition: service_healthy
      sandbox-fusion:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    command: rq worker -u redis://redis:6379/0
    environment:
      REDIS_URL: redis://redis:6379/0
      SANDBOX_FUSION_URL: http://sandbox-fusion:8080
    depends_on:
      redis:
        condition: service_healthy
      sandbox-fusion:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "rq info -u redis://redis:6379/0 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  sandbox-fusion:
    build:
      context: ../sandbox-fusion
      dockerfile: scripts/Dockerfile.server
    privileged: true
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
