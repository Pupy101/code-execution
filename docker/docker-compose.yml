services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      SANDBOX_FUSION_URL: http://sandbox-fusion:8080
    depends_on:
      sandbox-fusion:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  sandbox-fusion:
    build:
      context: ../sandbox-fusion
      dockerfile: scripts/Dockerfile.server
    privileged: true
    ports:
      - "9090:8080"
    mem_limit: 16g
    environment:
      SANDBOX_CONFIG: local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
